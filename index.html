<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>𝙺.x Cyber OS</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

</head>

<body>

<!-- BOOT -->

<div id="boot">

<h1 class="glitch">𝙺.x Cyber OS</h1>

<p id="bootText">Inicializando Sistema...</p>

<div id="logs"></div>

<div class="barra">

<div id="progresso"></div>

</div>

</div>



<!-- MATRIX -->

<canvas id="matrix"></canvas>



<!-- DESKTOP -->

<div id="desktop">

<!-- TOPO -->

<header>

<div class="logo">

⚠ 𝙺.x Cyber OS

</div>

<div class="status">

<span id="clock">00:00:00</span>

</div>

</header>



<!-- MENU -->

<nav id="menu">

<button onclick="abrirJanela('terminal')">

💻 Terminal

</button>

<button onclick="abrirJanela('tools')">

🛠 Ferramentas

</button>

<button onclick="abrirJanela('network')">

🌐 Network

</button>

<button onclick="abrirJanela('system')">

⚙ Sistema

</button>

<button onclick="abrirJanela('about')">

📄 Sobre

</button>

</nav>



<!-- ÁREA -->

<section id="workspace">

<div class="janela active" id="terminal">

<div class="titulo">

Terminal

</div>

<div id="saida"></div>

<input

id="comando"

placeholder="Digite um comando...">

</div>



<div class="janela" id="tools">

<h2>Ferramentas</h2>

<div class="cards">

<div class="card">🔐 Senhas</div>

<div class="card">⚡ Nick</div>

<div class="card">📝 Bio</div>

<div class="card">🔑 Hash</div>

<div class="card">📷 QR Code</div>

<div class="card">🔤 Base64</div>

</div>

</div>



<div class="janela" id="network">

<h2>Network</h2>

<p>Em desenvolvimento...</p>

</div>



<div class="janela" id="system">

<h2>Sistema</h2>

<p>Status: Online</p>

<p>Firewall: Ativo</p>

<p>Versão: 2.0</p>

</div>



<div class="janela" id="about">

<h2>Sobre</h2>

<p>𝙺.x Cyber OS</p>

<p>Cyber Security Interface</p>

<p>Made by K.x</p>

</div>

</section>



<!-- RODAPÉ -->

<footer>

<span id="statusBar">

● ONLINE

</span>

</footer>

</div>



<script src="script.js"></script>

</body>

</html>
